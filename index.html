<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Games</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --text: #1a1a18;
      --muted: #888880;
      --accent: #2d6a4f;
      --card-bg: #ffffff;
      --border: #e4e2dc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 0 1.5rem;
    }

    header {
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 0 2rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 0.75rem;
    }

    header p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
    }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 0 4rem;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.15s;
    }

    .game-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .game-icon {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      background: #e8f5ee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .game-info { flex: 1; }

    .game-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .game-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .game-arrow {
      font-size: 18px;
      color: var(--border);
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }

    .game-card:hover .game-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    footer {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.5rem 0 3rem;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <h1>My Games</h1>
    <p>自分で作ったブラウザゲームを公開しています。<br>HTMLとJavaScriptで作っています。</p>
  </header>

  <main>
    <p class="section-label">ゲーム一覧</p>

    <a class="game-card" href="game/index.html">
      <div class="game-icon">🎯</div>
      <div class="game-info">
        <p class="game-title">数当てゲーム</p>
        <p class="game-desc">1〜100の数字を7回以内に当てよう！ヒントをもとに絞り込んでいくシンプルなゲーム。</p>
      </div>
      <span class="game-arrow">→</span>
    </a>

  </main>

  <footer>
    Made with HTML &amp; JavaScript
  </footer>

</body>
</html>
