<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Games</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --text: #1a1a18;
      --muted: #888880;
      --accent: #2d6a4f;
      --card-bg: #ffffff;
      --border: #e4e2dc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 0 1.5rem;
      overflow-x: hidden;
    }

    /* ===== ヘッダーアニメーション ===== */
    header {
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 0 2rem;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transform: translateY(-24px);
      animation: fadeDown 0.7s ease forwards;
    }

    @keyframes fadeDown {
      to { opacity: 1; transform: translateY(0); }
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 0.75rem;
      /* 文字が1文字ずつ出てくる効果 */
      overflow: hidden;
    }

    /* タイトルの文字アニメーション */
    .title-char {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
      animation: charUp 0.5s ease forwards;
    }

    @keyframes charUp {
      to { opacity: 1; transform: translateY(0); }
    }

    header p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.6s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ===== メインコンテンツ ===== */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 0 4rem;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.8s forwards;
    }

    /* ===== ゲームカード ===== */
    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      text-decoration: none;
      color: inherit;

      /* カードが下からフワッと出てくる */
      opacity: 0;
      transform: translateY(30px);
      animation: cardUp 0.5s ease forwards;

      /* ホバー時のトランジション */
      transition: border-color 0.2s, transform 0.25s, box-shadow 0.25s;
    }

    /* カードを順番に遅らせて表示 */
    .game-card:nth-child(1) { animation-delay: 0.9s; }
    .game-card:nth-child(2) { animation-delay: 1.1s; }
    .game-card:nth-child(3) { animation-delay: 1.3s; }

    @keyframes cardUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ホバー時：カードが浮かぶ */
    .game-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(45, 106, 79, 0.12);
    }

    .game-icon {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      background: #e8f5ee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      transition: transform 0.3s;
    }

    /* ホバー時：アイコンが少し回転 */
    .game-card:hover .game-icon {
      transform: rotate(-8deg) scale(1.1);
    }

    .game-info { flex: 1; }

    .game-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .game-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .game-arrow {
      font-size: 18px;
      color: var(--border);
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }

    /* ホバー時：矢印が右に動く */
    .game-card:hover .game-arrow {
      color: var(--accent);
      transform: translateX(5px);
    }

    /* ===== フッター ===== */
    footer {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.5rem 0 3rem;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 0.6s ease 1.5s forwards;
    }
  </style>
</head>
<body>

  <header>
    <h1 id="title"></h1>
    <p>自分で作ったブラウザゲームを公開しています。<br>HTMLとJavaScriptで作っています。</p>
  </header>

  <main>
    <p class="section-label">ゲーム一覧</p>

    <a class="game-card" href="game/index.html">
      <div class="game-icon">🎯</div>
      <div class="game-info">
        <p class="game-title">数当てゲーム</p>
        <p class="game-desc">1〜100の数字を7回以内に当てよう！ヒントをもとに絞り込んでいくシンプルなゲーム。</p>
      </div>
      <span class="game-arrow">→</span>
    </a>

    <a class="game-card" href="memory/index.html">
      <div class="game-icon">🎴</div>
      <div class="game-info">
        <p class="game-title">神経衰弱</p>
        <p class="game-desc">絵文字カードを2枚ずつめくってペアを揃えよう！記憶力が試されるゲーム。</p>
      </div>
      <span class="game-arrow">→</span>
    </a>

    <a class="game-card" href="quiz/index.html">
      <div class="game-icon">🔬</div>
      <div class="game-info">
        <p class="game-title">科学・自然クイズ</p>
        <p class="game-desc">科学と自然に関する10問に挑戦！知識を試してみよう。</p>
      </div>
      <span class="game-arrow">→</span>
    </a>

  </main>

  <footer>
    Made with HTML &amp; JavaScript
  </footer>

  <script>
    // ===== タイトルを1文字ずつアニメーションで表示 =====
    const titleText = 'My Games';
    const titleEl   = document.getElementById('title');

    titleText.split('').forEach((char, i) => {
      const span = document.createElement('span');
      span.className   = 'title-char';
      span.textContent = char === ' ' ? '\u00A0' : char;
      span.style.animationDelay = (0.1 + i * 0.07) + 's';
      titleEl.appendChild(span);
    });
  </script>

</body>
</html>
